<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hotmail_585 — замов трек</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
@keyframes borderGlow{0%{box-shadow:0 0 8px #7a0000,0 0 20px #5a0000,inset 0 0 8px #3a000033;}50%{box-shadow:0 0 22px #e03030,0 0 50px #c0202099,inset 0 0 18px #ff202044;}100%{box-shadow:0 0 8px #7a0000,0 0 20px #5a0000,inset 0 0 8px #3a000033;}}
@keyframes borderColor{0%{border-color:#6b0000;}25%{border-color:#e03030;}50%{border-color:#ff6060;}75%{border-color:#e03030;}100%{border-color:#6b0000;}}
@keyframes avatarPulse{0%{box-shadow:0 0 0 0 #e0303055;}70%{box-shadow:0 0 0 10px #e0303000;}100%{box-shadow:0 0 0 0 #e0303000;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes successPop{0%{transform:scale(0.8);opacity:0;}60%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
body{background:#1a0000;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;font-family:'Inter',sans-serif;}
.card{background:#240808;border-radius:24px;padding:40px 32px 36px;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;border:1.5px solid #6b0000;animation:borderGlow 2.4s ease-in-out infinite,borderColor 2.4s ease-in-out infinite;}
.avatar-wrap{width:100px;height:100px;border-radius:50%;border:3px solid #e03030;overflow:hidden;margin-bottom:16px;animation:avatarPulse 2s ease-in-out infinite;flex-shrink:0;}
.avatar-wrap img{width:100%;height:100%;object-fit:cover;}
.streamer-name{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;color:#ff4444;margin-bottom:4px;text-align:center;}
.streamer-sub{font-size:13px;color:#7a3535;margin-bottom:32px;text-align:center;}
.field-label{font-size:11px;color:#7a3535;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.field-wrap{width:100%;margin-bottom:12px;}
input[type=text]{width:100%;background:#300d0d;border:1px solid #4a1515;border-radius:10px;padding:12px 14px;color:#f0c0c0;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border 0.2s;}
input[type=text]:focus{border-color:#e03030;}
input[type=text]::placeholder{color:#5a2020;}
.preview-box{background:#300d0d;border:1px solid #4a1515;border-radius:10px;padding:12px 14px;min-height:50px;display:flex;align-items:center;gap:12px;margin-bottom:20px;width:100%;transition:border 0.2s;}
.preview-box.loaded{border-color:#6b2020;}
.preview-thumb{width:38px;height:38px;border-radius:8px;background:#3d1010;overflow:hidden;flex-shrink:0;}
.preview-thumb img{width:100%;height:100%;object-fit:cover;}
.preview-info{flex:1;min-width:0;}
.preview-title{font-size:13px;color:#5a2020;}
.preview-title.has-track{color:#e0a0a0;}
.preview-ch{font-size:11px;color:#5a2020;margin-top:2px;}
.send-btn{width:100%;background:#b83030;border:none;border-radius:12px;padding:14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Unbounded',sans-serif;transition:background 0.2s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.02em;}
.send-btn:hover{background:#a02828;}
.send-btn:active{transform:scale(0.98);}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
.status-msg{width:100%;margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;text-align:center;display:none;animation:successPop 0.3s ease both;}
.status-msg.success{background:#1a3d1a;color:#7dcc7d;border:1px solid #2a5a2a;}
.status-msg.error{background:#3d1010;color:#e08080;border:1px solid #5a2020;}
.divider{width:100%;height:1px;background:#2d0a0a;margin:24px 0 20px;}
.queue-head{width:100%;font-size:11px;color:#7a3535;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.queue-list{width:100%;display:flex;flex-direction:column;}
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #2d0a0a;}
.queue-item:last-child{border-bottom:none;}
.q-num{font-size:11px;color:#5a2020;min-width:18px;font-family:'Unbounded',sans-serif;}
.q-info{flex:1;min-width:0;}
.q-name{font-size:13px;color:#e0a0a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-from{font-size:11px;color:#6a2a2a;margin-top:2px;}
.now-pill{background:#4a000033;border:1px solid #e0303066;border-radius:99px;font-size:9px;color:#ff6060;padding:3px 9px;white-space:nowrap;font-family:'Unbounded',sans-serif;}
.empty-queue{font-size:13px;color:#4a1a1a;padding:12px 0;text-align:center;width:100%;}
</style>
</head>
<body>
<div class="card">
  <div class="avatar-wrap">
    <img src="https://i.pinimg.com/originals/a0/0e/80/a00e800a2fdcb9a18448165f89489620.gif" alt="hotmail_585">
  </div>
  <div class="streamer-name">hotmail_585</div>
  <div class="streamer-sub">замов трек на стрімі</div>
  <div class="field-wrap">
    <div class="field-label">твій нік</div>
    <input type="text" id="viewer-name" placeholder="введи свій нікнейм...">
  </div>
  <div class="field-wrap">
    <div class="field-label">посилання на youtube</div>
    <input type="text" id="yt-url" placeholder="https://youtube.com/watch?v=..." oninput="onUrlInput()">
  </div>
  <div style="width:100%">
    <div class="field-label" style="margin-bottom:6px">прев'ю</div>
    <div class="preview-box" id="preview-box">
      <div class="preview-thumb" id="preview-thumb"></div>
      <div class="preview-info">
        <div class="preview-title" id="preview-title">вставте посилання...</div>
        <div class="preview-ch" id="preview-ch"></div>
      </div>
    </div>
  </div>
  <button class="send-btn" id="send-btn" onclick="submitRequest()">&#9658; надіслати замовлення</button>
  <div class="status-msg" id="status-msg"></div>
  <div class="divider"></div>
  <div class="queue-head">&#9835; черга треків</div>
  <div class="queue-list" id="queue-list"><div class="empty-queue">черга порожня</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhLUKfZbwe2F1cZlCYF0NzbL6CsK00uc8",
  authDomain: "hotmail-music-2a339.firebaseapp.com",
  databaseURL: "https://hotmail-music-2a339-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotmail-music-2a339",
  storageBucket: "hotmail-music-2a339.firebasestorage.app",
  messagingSenderId: "101550523168",
  appId: "1:101550523168:web:680bef3cc3c9f995838d45"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const queueRef = ref(db, 'queue');

let previewData = null;
let debounceTimer = null;

function extractVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

window.onUrlInput = function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchPreview, 600);
};

async function fetchPreview() {
  const url = document.getElementById('yt-url').value.trim();
  const titleEl = document.getElementById('preview-title');
  const chEl = document.getElementById('preview-ch');
  const thumbEl = document.getElementById('preview-thumb');
  const box = document.getElementById('preview-box');
  const vid = extractVideoId(url);
  if (!vid) {
    titleEl.textContent = 'вставте посилання...';
    titleEl.className = 'preview-title';
    chEl.textContent = '';
    thumbEl.innerHTML = '';
    box.classList.remove('loaded');
    previewData = null;
    return;
  }
  titleEl.textContent = 'завантажую...';
  try {
    const r = await fetch(`https://www.youtube.com/oembed?url=https://youtube.com/watch?v=${vid}&format=json`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    
previewData = {
  id: vid,
  title: d.title,
  channel: d.author_name,
  from: ""
};
    titleEl.textContent = d.title;
    titleEl.className = 'preview-title has-track';
    chEl.textContent = d.author_name;
    thumbEl.innerHTML = `<img src="https://img.youtube.com/vi/${vid}/default.jpg" alt="">`;
    box.classList.add('loaded');
  } catch {
    previewData = { id: vid, title: 'YouTube трек', channel: '' };
    titleEl.textContent = 'трек знайдено';
    titleEl.className = 'preview-title has-track';
    box.classList.add('loaded');
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3500);
}

window.submitRequest = async function() {
  const name = document.getElementById('viewer-name').value.trim() || 'Анонім';
  if (!previewData) { showStatus('спочатку вставте посилання на youtube!', 'error'); return; }
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  try {
    await push(queueRef, { ...previewData, from: name, ts: Date.now(), status: 'pending' });
    document.getElementById('yt-url').value = '';
    document.getElementById('viewer-name').value = '';
    document.getElementById('preview-title').textContent = 'вставте посилання...';
    document.getElementById('preview-title').className = 'preview-title';
    document.getElementById('preview-ch').textContent = '';
    document.getElementById('preview-thumb').innerHTML = '';
    document.getElementById('preview-box').classList.remove('loaded');
    previewData = null;
    showStatus('замовлення надіслано! очікуй на стрімі ✓', 'success');
  } catch(e) {
    showStatus('помилка. спробуй ще раз', 'error');
  }
  btn.disabled = false;
};

onValue(queueRef, (snapshot) => {
  const list = document.getElementById('queue-list');
  const data = snapshot.val();
  if (!data) { list.innerHTML = '<div class="empty-queue">черга порожня</div>'; return; }
  const items = Object.entries(data)
    .map(([k,v]) => ({...v, key: k}))
    .filter(v => v.status === 'approved' || v.status === 'playing')
    .sort((a,b) => a.ts - b.ts);
  if (items.length === 0) { list.innerHTML = '<div class="empty-queue">черга порожня</div>'; return; }
  list.innerHTML = items.map((t, i) => `
    <div class="queue-item">
      ${t.status === 'playing' ? '<span class="now-pill">grає</span>' : `<span class="q-num">${i}</span>`}
      <div class="q-info">
        <div class="q-name">${t.title}</div>
        <div class="q-from">від ${t.from}</div>
      </div>
    </div>
  `).join('');
});
</script>
</body>
</html>
